version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=changeme
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://root:changeme@mongo:27017
      - DB_NAME=jdom_production
    depends_on:
      - mongo
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        # MUST match the public URL your backend will be reachable at
        REACT_APP_BACKEND_URL: http://localhost:8001
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
